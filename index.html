<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fresh Kitchen - Weekly Menu Planner</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6C63FF" />
    <meta name="description" content="Plan your weekly meals with ease using AI-powered recommendations" />
    <style>
      html.app-loading #app {
        opacity: 0;
      }

      html.app-ready #app {
        opacity: 1;
        transition: opacity 220ms ease;
      }
    </style>
    <script>
      document.documentElement.classList.add('app-loading');
      try {
        const savedTheme = localStorage.getItem('menuPlanner_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
      setTimeout(function () {
        document.documentElement.classList.remove('app-loading');
        document.documentElement.classList.add('app-ready');
      }, 1800);
    </script>
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="logo-section">
            <div class="brand-row">
              <h1 data-i18n="appName">Fresh Kitchen</h1>
              <span class="brand-glow-dot" aria-hidden="true"></span>
            </div>
            <p data-i18n="tagline">Plan your weekly meals with ease</p>
            <div class="header-chips" aria-hidden="true">
              <span class="header-chip">Weekly</span>
              <span class="header-chip">Smart Basket</span>
              <span class="header-chip">Market Match</span>
            </div>
          </div>
          <div class="header-controls">
            <button id="theme-btn" class="control-btn" title="Toggle dark mode">Dark</button>
            <button id="lang-btn" class="control-btn" title="Switch language">BG</button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-container">
        <!-- Preferences Panel -->
        <aside class="preferences-panel">
          <h2 data-i18n="preferences">Preferences</h2>

          <div class="form-group">
            <label for="people-input" data-i18n="labelPeople">Number of people</label>
            <select id="people-input">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>

          <div class="form-group">
            <label for="variety-select" data-i18n="labelVariety">Variety</label>
            <select id="variety-select">
              <option value="low" data-i18n="varietyLow">Low</option>
              <option value="medium" data-i18n="varietyMedium" selected>Medium</option>
              <option value="high" data-i18n="varietyHigh">High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="cuisine-select" data-i18n="labelCuisine">Cuisine</label>
            <select id="cuisine-select">
              <option value="mix" data-i18n="cuisineMix" selected>International (Mix)</option>
              <option value="Bulgarian" data-i18n="cuisineBulgarian">Bulgarian</option>
              <option value="Italian" data-i18n="cuisineItalian">Italian</option>
              <option value="Vegetarian" data-i18n="cuisineVegetarian">Vegetarian</option>
              <option value="Vegan" data-i18n="cuisineVegan">Vegan</option>
              <option value="GlutenFree" data-i18n="cuisineGlutenfree">Gluten-free</option>
            </select>
          </div>

          <div class="form-group">
            <label for="prep-time-select" data-i18n="labelPrepTime">Prep time</label>
            <select id="prep-time-select">
              <option value="any" data-i18n="prepTimeAny" selected>Any duration</option>
              <option value="quick" data-i18n="prepTimeQuick">Quick (up to 25 min)</option>
              <option value="medium" data-i18n="prepTimeMedium">Medium (up to 45 min)</option>
              <option value="long" data-i18n="prepTimeLong">Long (45+ min)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="allergies-input" data-i18n="labelAllergies">Allergies (comma-separated)</label>
            <input
              type="text"
              id="allergies-input"
              placeholder="e.g., nuts, shellfish"
              data-placeholder="placeholderAllergies"
            />
          </div>

          <div class="form-group">
            <label data-i18n="labelDietaryExclusions">Exclude from meals</label>
            <div class="dietary-checkboxes">
              <label class="diet-check-label">
                <input type="checkbox" id="diet-no-beef" value="no_beef"> <span data-i18n="dietNoBeef">No beef</span>
              </label>
              <label class="diet-check-label">
                <input type="checkbox" id="diet-no-pork" value="no_pork"> <span data-i18n="dietNoPork">No pork</span>
              </label>
              <label class="diet-check-label">
                <input type="checkbox" id="diet-lactose-free" value="lactose_free"> <span data-i18n="dietLactoseFree">Lactose-free</span>
              </label>
              <label class="diet-check-label">
                <input type="checkbox" id="diet-no-chicken" value="no_chicken"> <span data-i18n="dietNoChicken">No chicken</span>
              </label>
              <label class="diet-check-label">
                <input type="checkbox" id="diet-no-seafood" value="no_seafood"> <span data-i18n="dietNoSeafood">No seafood</span>
              </label>
              <label class="diet-check-label">
                <input type="checkbox" id="diet-no-nuts" value="no_nuts"> <span data-i18n="dietNoNuts">No nuts</span>
              </label>
              <label class="diet-check-label">
                <input type="checkbox" id="diet-gluten-free" value="gluten_free"> <span data-i18n="dietGlutenFree">Gluten-free ingredients</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="notes-input" data-i18n="labelNotes">Additional notes</label>
            <textarea id="notes-input" placeholder="Any dietary preferences..." data-placeholder="placeholderNotes"></textarea>
          </div>

          <div class="form-group">
            <label for="budget-input" data-i18n="weeklyBudget">Weekly Budget (€)</label>
            <input type="number" id="budget-input" min="0" step="5" placeholder="e.g. 80" data-placeholder="placeholderBudget" />
          </div>

          <div class="form-actions">
            <button id="btn-reset" class="btn btn-secondary" data-i18n="btnReset">Reset</button>
            <button id="btn-generate" class="btn btn-primary" data-i18n="btnGenerate">Generate Menu</button>
          </div>

          <!-- Spoonacular API Integration -->
          <details class="spoonacular-section" id="spoonacular-settings">
            <summary class="spoonacular-summary">
              <span class="spoon-logo" aria-hidden="true">🥄</span>
              <span data-i18n="spoonacularTitle">Spoonacular API</span>
              <span class="spoon-status-dot" id="spoon-status-dot" aria-label="Status"></span>
            </summary>
            <div class="spoon-content">
              <p class="spoon-hint" data-i18n="spoonacularHint">
                Unlock richer recipes, real nutrition data and smarter search.
              </p>
              <div class="form-group spoon-key-group">
                <label for="spoonacular-key-input" data-i18n="spoonacularKeyLabel">API Key</label>
                <div class="spoon-key-row">
                  <input
                    type="password"
                    id="spoonacular-key-input"
                    autocomplete="off"
                    data-placeholder="spoonacularKeyPlaceholder"
                    placeholder="Paste your free API key here"
                  />
                  <button class="btn btn-secondary spoon-save-btn" id="spoon-save-btn" data-i18n="spoonacularSave">Save</button>
                </div>
                <a
                  class="spoon-get-key-link"
                  href="https://spoonacular.com/food-api"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-i18n="spoonacularGetKey"
                >Get a free key ↗</a>
              </div>
            </div>
          </details>

        </aside>

        <!-- Tabs -->
        <div class="tabs-container">
          <div class="tabs">
            <button class="tab active" data-tab="menu" data-i18n="tabMenu">Weekly Menu</button>
            <button class="tab" data-tab="basket" data-i18n="tabBasket">Shopping Basket</button>
            <button class="tab" data-tab="markets" data-i18n="tabMarkets">Markets</button>
            <button class="tab" data-tab="favorites" data-i18n="tabFavorites">Favorites</button>
          </div>

          <!-- Menu Tab -->
          <section class="pane active" data-pane="menu">
            <div id="menu-container" class="menu-container"></div>
          </section>

          <!-- Basket Tab -->
          <section class="pane" data-pane="basket">
            <div id="basket-container" class="basket-container"></div>
          </section>

          <!-- Markets Tab -->
          <section class="pane" data-pane="markets">
            <div id="markets-container" class="markets-container"></div>
          </section>

          <!-- Favorites Tab -->
          <section class="pane" data-pane="favorites">
            <div id="favorites-container" class="favorites-container"></div>
          </section>
        </div>
      </main>
    </div>

    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal">
      <div class="modal-content recipe-modal-content"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
