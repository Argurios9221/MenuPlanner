<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Menu Planner – Fresh Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fdf6ee;
      --panel-bg: #fffdf9;
      --accent: #d4895a;
      --accent-strong: #b5704a;
      --accent-warm: #fceee2;
      --accent-sage: #8ea58a;
      --accent-sage-light: #e3ede1;
      --accent-pink: #d9899e;
      --accent-lavender: #a994c8;
      --text-main: #3a2e28;
      --text-muted: #7a6b60;
      --border: #e6d9cc;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 8px 30px rgba(80, 50, 30, 0.1);
      --shadow-soft: 0 4px 14px rgba(80, 50, 30, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 0;
    }

    /* Header */
    .site-header {
      background: linear-gradient(135deg, #fceee2 0%, #f0e4f2 100%);
      color: var(--text-main);
      padding: 32px 40px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .site-header .logo {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .site-header .tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .btn-lang {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--border);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: 0.2s;
      padding: 0;
      box-shadow: var(--shadow-soft);
    }

    .btn-lang:hover {
      background: #fff;
      box-shadow: var(--shadow);
      transform: scale(1.08);
    }

    .app-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 12px 28px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: 0.2s;
      font-family: "Inter", system-ui, sans-serif;
    }

    .tab:hover {
      color: var(--accent);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 28px;
    }

    /* Panels */
    .panel {
      background: var(--panel-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-title {
      font-family: "Playfair Display", serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-main);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, textarea {
      width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 14px;
      font-family: "Inter", system-ui, sans-serif;
      background: #fff;
      color: var(--text-main);
      transition: 0.2s;
    }

    select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 137, 90, 0.2);
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    /* Buttons */
    .button-row {
      display: flex;
      gap: 10px;
      padding-top: 4px;
    }

    button {
      padding: 10px 20px;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: none;
      font-size: 14px;
      font-family: "Inter", system-ui, sans-serif;
      transition: 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      flex: 1;
      box-shadow: 0 4px 12px rgba(212, 137, 90, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent-strong);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #fff;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    #status {
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
    }

    /* Menu grid */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .day-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      animation: fadeIn 0.4s ease;
      background: #fff;
    }

    .day-card .day-name {
      font-family: "Playfair Display", serif;
      font-size: 18px;
      font-weight: 600;
      padding: 14px 18px 10px;
      color: var(--accent-strong);
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #fceee2 0%, #f0e4f2 100%);
    }

    .meal-list {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .meal-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #efe4d9;
      transition: background 0.15s;
    }

    .meal-item:last-child {
      border-bottom: none;
    }

    .meal-actions {
      margin-left: auto;
      flex-shrink: 0;
    }

    .btn-recipe {
      background: var(--accent-warm);
      color: var(--accent-strong);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: "Inter", system-ui, sans-serif;
      white-space: nowrap;
    }

    .btn-recipe:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Recipe Modal */
    .recipe-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .recipe-overlay.visible {
      display: flex;
    }

    .recipe-modal {
      background: #fff;
      border-radius: var(--radius-lg);
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease;
    }

    .recipe-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #fceee2 0%, #f0e4f2 100%);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .recipe-modal-header h2 {
      font-family: "Playfair Display", serif;
      font-size: 20px;
      color: var(--text-main);
      margin: 0;
    }

    .recipe-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0 4px;
      line-height: 1;
    }

    .recipe-close:hover {
      color: var(--text-main);
    }

    .recipe-modal-body {
      padding: 24px;
    }

    .recipe-modal-body img {
      width: 100%;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }

    .recipe-section-title {
      font-family: "Playfair Display", serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-strong);
      margin: 16px 0 8px;
    }

    .recipe-ingredients-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .recipe-ingredients-list li {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
    }

    .recipe-instructions {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-main);
      white-space: pre-line;
    }

    .recipe-loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .meal-item:hover {
      background: #fdf6ee;
    }

    .meal-thumb {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .meal-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meal-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
    }

    .meal-name {
      font-size: 14px;
      color: var(--text-main);
      font-weight: 500;
    }

    /* Basket categories */
    .basket-category {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      animation: fadeIn 0.4s ease;
      background: #fff;
    }

    .basket-category-header {
      font-family: "Playfair Display", serif;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .basket-category-header .cat-icon {
      font-size: 20px;
    }

    .basket-items {
      padding: 12px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .basket-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text-main);
    }

    .error-box {
      color: #b91c1c;
      background: #fee2e2;
      border: 1px solid #fecaca;
      padding: 12px;
      border-radius: var(--radius-md);
      display: none;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .site-header {
        padding: 20px 16px;
        flex-wrap: wrap;
      }
      .site-header .tagline {
        width: 100%;
        margin-left: 0;
        margin-top: 4px;
      }
    }

    @media (max-width: 600px) {
      .app-shell {
        padding: 16px 12px 32px;
        gap: 16px;
      }
      .panel {
        padding: 16px;
      }
      .days-grid {
        grid-template-columns: 1fr;
      }
      .button-row {
        flex-direction: column;
      }
    }

    /* Heart / Fav buttons */
    .btn-fav {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      transition: transform 0.2s;
      opacity: 0.5;
    }
    .btn-fav:hover { opacity: 1; transform: scale(1.2); }
    .btn-fav.active { opacity: 1; color: #e74c3c; }

    /* Share buttons */
    .btn-share {
      background: var(--accent-warm);
      color: var(--accent-strong);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: "Inter", system-ui, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-share:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-share.is-open {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 137, 90, 0.28);
    }

    .share-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      padding: 8px 0;
      z-index: 1100;
      min-width: 180px;
      display: none;
    }
    .share-dropdown.visible { display: block; }
    .share-dropdown button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 16px;
      background: none;
      border: none;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-main);
      font-family: "Inter", system-ui, sans-serif;
    }
    .share-dropdown button:hover { background: var(--bg); }

    /* Menu action bar */
    .menu-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    /* Basket checkboxes */
    .basket-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .basket-item-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .basket-item-row.checked .basket-item-label {
      text-decoration: line-through;
      opacity: 0.5;
    }
    .basket-item-label {
      font-size: 13px;
      color: var(--text-main);
      cursor: pointer;
    }
    .basket-item-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .basket-items {
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Favorites tab content */
    .fav-section {
      margin-bottom: 20px;
    }
    .fav-section-title {
      font-family: "Playfair Display", serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-strong);
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .fav-empty {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 40px 20px;
    }
    .fav-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      animation: fadeIn 0.3s ease;
    }
    .fav-card img {
      width: 48px; height: 48px; border-radius: 10px; object-fit: cover;
    }
    .fav-card-info {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }
    .fav-card-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }
    .btn-remove-fav {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .btn-remove-fav:hover { color: #e74c3c; }

    .share-wrap { position: relative; display: inline-block; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-main);
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 2000;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="logo">Fresh Kitchen</div>
    <div class="tagline" data-i18n="tagline">Plan your weekly meals with ease</div>
    <button class="btn-lang" id="langToggle" title="Switch to Bulgarian">🇧🇬</button>
  </header>

  <div class="app-shell">

    <div class="tabs">
      <button class="tab active" data-tab="menu" data-i18n="tabMenu">Weekly Menu</button>
      <button class="tab" data-tab="basket" data-i18n="tabBasket">Shopping Basket</button>
      <button class="tab" data-tab="markets" data-i18n="tabMarkets">Markets</button>
      <button class="tab" data-tab="favorites" data-i18n="tabFavorites">Favorites</button>
      <button class="tab" data-tab="search" data-i18n="tabSearch">Search Recipes</button>
    </div>

    <div class="layout">

      <!-- LEFT PANEL -->
      <div class="panel">
        <div class="panel-title" data-i18n="preferences">Preferences</div>

        <label data-i18n="labelPeople">Number of people</label>
        <select id="people">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
        </select>

        <label data-i18n="labelVariety">Variety</label>
        <select id="variety">
          <option value="low" data-i18n="varietyLow">Low</option>
          <option value="medium" selected data-i18n="varietyMedium">Medium</option>
          <option value="high" data-i18n="varietyHigh">High</option>
        </select>

        <label data-i18n="labelCuisine">Cuisine</label>
        <select id="cuisine">
          <option value="mix" selected data-i18n="cuisineMix">Mix of all cuisines</option>
          <option value="vegetarian" data-i18n="cuisineVegetarian">Vegetarian</option>
          <option value="vegan" data-i18n="cuisineVegan">Vegan</option>
          <option value="glutenfree" data-i18n="cuisineGlutenfree">Gluten-free</option>
          <option value="italian" data-i18n="cuisineItalian">Italian</option>
        </select>

        <label data-i18n="labelPrepTime">Prep time</label>
        <select id="prepTime">
          <option value="any" selected data-i18n="prepTimeAny">Any duration</option>
          <option value="quick" data-i18n="prepTimeQuick">Quick (up to 25 min)</option>
          <option value="medium" data-i18n="prepTimeMedium">Medium (up to 45 min)</option>
          <option value="long" data-i18n="prepTimeLong">Long (45+ min)</option>
        </select>

        <label data-i18n="labelNotes">Additional notes</label>
        <textarea id="prompt" data-i18n-placeholder="placeholderNotes" placeholder="Any dietary preferences or notes..."></textarea>

        <div class="button-row">
          <button id="reset" class="btn-secondary" data-i18n="btnReset">Reset</button>
          <button id="generate" class="btn-primary" data-i18n="btnGenerate">Generate Menu</button>
        </div>

        <div id="status" data-i18n="statusReady">Ready to generate.</div>
        <div id="error" class="error-box"></div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="panel" style="min-height: 400px;">
        <div id="menuActionsBar" class="menu-actions" style="display:none;"></div>
        <div id="menuContainer" class="days-grid"></div>
        <div id="basketContainer" class="days-grid" style="display:none;"></div>
        <div id="marketsContainer" style="display:none;"></div>
        <div id="favoritesContainer" style="display:none;"></div>
        <div id="search-container" style="display:none;"></div>
        <div id="search-results-container" style="display:none;"></div>
      </div>

    </div>
  </div>

  <!-- Recipe Modal -->
  <div class="recipe-overlay" id="recipeOverlay">
    <div class="recipe-modal">
      <div class="recipe-modal-header">
        <h2 id="recipeTitle">Recipe</h2>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn-fav" id="recipeFavBtn" title="Add to favorites">♡</button>
          <div class="share-wrap">
            <button class="btn-share" id="recipeShareBtn">📲 <span data-i18n="shareRecipe">Share</span></button>
            <div class="share-dropdown" id="recipeShareDrop"></div>
          </div>
          <button class="recipe-close" id="recipeClose">&times;</button>
        </div>
      </div>
      <div class="recipe-modal-body" id="recipeBody">
        <div class="recipe-loading">Loading recipe...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
