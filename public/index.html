<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <title>Menu Planner – Fresh Garden</title>

  <style>
    :root {
      --bg: #fdfdfb;
      --panel-bg: #ffffff;
      --accent-green: #7ed9a6;
      --accent-green-strong: #4bbf78;
      --accent-yellow: #fff4c7;
      --accent-yellow-strong: #ffe89a;
      --text-main: #2d3a3f;
      --text-muted: #6b7a80;
      --border: #e8ece8;
      --radius-lg: 22px;
      --radius-md: 14px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-soft: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }
      .app-shell {
        padding: 0;
        gap: 12px;
      }
      .layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .panel {
        padding: 12px;
        gap: 10px;
      }
      .button-row {
        flex-direction: column;
        gap: 8px;
      }
      .days-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .day-card {
        padding: 12px;
      }
      label, select, textarea, button {
        font-size: 16px;
      }
      .tab {
        font-size: 14px;
        padding: 8px 12px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 32px;
      display: flex;
      justify-content: center;
    }

    .app-shell {
      width: 100%;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 12px;
    }

    .tab {
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-muted);
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: 0.25s;
      font-size: 15px;
    }

    .tab.active {
      background: var(--accent-green);
      color: #fff;
      border-color: var(--accent-green-strong);
      box-shadow: 0 4px 12px rgba(126, 217, 166, 0.35);
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 28px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* Panels */
    .panel {
      background: var(--panel-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 28px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
    }

    select, textarea {
      width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 12px;
      font-size: 15px;
      background: #fff;
      color: var(--text-main);
      box-shadow: var(--shadow-soft);
      transition: 0.2s;
    }

    select:focus, textarea:focus {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(126, 217, 166, 0.25);
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    /* Buttons */
    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    button {
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      border: none;
      font-size: 15px;
      transition: 0.25s;
    }

    .btn-primary {
      background: var(--accent-green);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(126, 217, 166, 0.35);
    }

    .btn-primary:hover {
      background: var(--accent-green-strong);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Status */
    #status {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: -6px;
      min-height: 20px;
    }

    /* Cards */
    .days-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .days-grid {
        grid-template-columns: 1fr;
      }
    }

    .day-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 22px;
      box-shadow: var(--shadow-soft);
      animation: fadeIn 0.4s ease;
    }

    /* Alternating pastel blocks */
    .day-card:nth-child(odd) {
      background: var(--accent-yellow);
    }

    .day-card:nth-child(even) {
      background: #e9f9ef;
    }

    .day-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--accent-green-strong);
    }

    .meal-list {
      font-size: 15px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .error-box {
      color: #b91c1c;
      background: #fee2e2;
      border: 1px solid #fecaca;
      padding: 12px;
      border-radius: 12px;
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <div class="tabs">
      <button class="tab active" data-tab="menu">Меню</button>
      <button class="tab" data-tab="basket">Кошница</button>
    </div>

    <div class="layout">

      <!-- LEFT PANEL -->
      <div class="panel">
        <label>Брой хора:</label>
        <select id="people">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
        </select>

        <label>Разнообразие:</label>
        <select id="variety">
          <option value="low">Ниско</option>
          <option value="medium" selected>Средно</option>
          <option value="high">Високо</option>
        </select>
        <label>Кухня:</label>
        <select id="cuisine">
          <option value="mix" selected>Микс от всички кухни</option>
          <option value="vegetarian">Вегетарианска кухня</option>
          <option value="vegan">Веган кухня</option>
          <option value="glutenfree">Безглутенова кухня</option>
          <option value="bulgarian">Българска традиционна кухня</option>
          <option value="german">Традиционна Немска кухня</option>
        </select>

        <label>Допълнителни инструкции:</label>
        <textarea id="prompt">Генерирай ми седмично меню.</textarea>

        <div class="button-row">
          <button id="reset" class="btn-secondary">Изчисти</button>
          <button id="generate" class="btn-primary">Генерирай меню</button>
        </div>

        <div id="status">Готово за генериране.</div>

        <div id="error" class="error-box"></div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="panel">
        <div id="menuContainer" class="days-grid"></div>
        <div id="basketContainer" class="days-grid" style="display:none;"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
